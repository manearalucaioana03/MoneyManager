{% extends 'core/base.html' %}
{% block title %}Reset Email Sent{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 text-center">
                <h2 class="mb-3">Reset Email Sent</h2>
                <p class="text-muted">If an account with that email exists, you will receive a password reset link shortly.</p>
                <a class="btn btn-primary" href="{% url 'login' %}">Back to login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
