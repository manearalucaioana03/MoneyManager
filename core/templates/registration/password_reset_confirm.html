{% extends 'core/base.html' %}
{% block title %}Choose New Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h2 class="mb-4">Choose New Password</h2>
                {% if validlink %}
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary" type="submit">Change password</button>
                </form>
                {% else %}
                <p class="text-danger mb-0">This password reset link is invalid or has already been used.</p>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
